name: CI

# Runs the same gates we expect locally before a deploy: typecheck + build,
# lint (zero warnings), and the unit test suite.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (zero warnings)
        run: npm run lint

      - name: Typecheck + build
        run: npm run build

      - name: Unit tests
        run: npm test
