<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1815" />
    <!-- Self-hosted fonts (bundled in /public/fonts). No network dependency,
         so cold launch never blocks on Google Fonts and the kitchen iPad keeps
         its typeface offline. Preload the two most-used faces to cut FOUT. -->
    <link
      rel="preload"
      href="/fonts/inter-600-3.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/fraunces-600-3.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <title>Home Plus</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
